<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Notepad</title>
<style>
  :root {
    --bg: #f6f6f4;
    --panel: #ffffff;
    --ink: #1c1c1c;
    --muted: #6b6b6b;
    --line: #e2e2de;
    --accent: #2f6f4f;
    --tab-active: #ffffff;
    --tab-idle: #ececea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a19;
      --panel: #232322;
      --ink: #e8e8e6;
      --muted: #9a9a96;
      --line: #333331;
      --accent: #6fbf8f;
      --tab-active: #232322;
      --tab-idle: #2c2c2a;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .toolbar button {
    font: inherit;
    font-size: 13px;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 9px;
    cursor: pointer;
    line-height: 1;
  }
  .toolbar button:hover { background: var(--tab-idle); }
  .toolbar button:active { transform: translateY(1px); }
  .sep { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
  .spacer { flex: 1; }
  .hint { color: var(--muted); font-size: 12px; }

  /* Tabs */
  .tabs {
    display: flex;
    align-items: stretch;
    gap: 4px;
    padding: 6px 8px 0;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px 6px 12px;
    background: var(--tab-idle);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    white-space: nowrap;
    max-width: 220px;
  }
  .tab.active { background: var(--tab-active); font-weight: 600; }
  .tab .name {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
    font-size: 13px;
    border: none;
    background: transparent;
    color: inherit;
    font: inherit;
    padding: 0;
  }
  .tab .close {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 0 2px;
    border-radius: 4px;
  }
  .tab .close:hover { background: var(--line); color: var(--ink); }
  .newtab {
    align-self: center;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0 8px;
  }

  /* Editor */
  .editor-wrap { flex: 1; display: flex; min-height: 0; }
  textarea {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: var(--bg);
    color: var(--ink);
    padding: 20px 24px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    line-height: 1.6;
    tab-size: 4;
  }

  .statusbar {
    display: flex;
    gap: 16px;
    padding: 4px 12px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
  }

  /* Restore dialog */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 24px;
    width: min(440px, 90vw);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal h2 { margin: 0 0 6px; font-size: 17px; }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .choice {
    display: block;
    width: 100%;
    text-align: left;
    font: inherit;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .choice:hover { border-color: var(--accent); }
  .choice strong { display: block; font-size: 14px; }
  .choice span { font-size: 12px; color: var(--muted); }
  .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 4px; color: var(--muted); }
  .modal .reset { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; margin-top: 6px; text-decoration: underline; }

  /* JSON tree panel */
  .editor-wrap { position: relative; }
  .json-panel {
    position: absolute;
    inset: 0;
    background: var(--panel);
    display: none;
    flex-direction: column;
    z-index: 20;
  }
  .json-panel.open { display: flex; }
  .json-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .json-head .title { font-size: 13px; font-weight: 600; }
  .json-head .badge { font-size: 11px; color: var(--muted); }
  .json-head .grow { flex: 1; }
  .json-head button {
    font: inherit; font-size: 12px; color: var(--ink);
    background: transparent; border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 8px; cursor: pointer;
  }
  .json-head button:hover { background: var(--tab-idle); }
  .json-search {
    font: inherit; font-size: 12px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 8px; width: 150px;
  }
  .json-body {
    flex: 1;
    overflow: auto;
    padding: 10px 8px 10px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
  }
  .json-error {
    padding: 16px 20px;
    color: #c0392b;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    white-space: pre-wrap;
  }
  @media (prefers-color-scheme: dark) { .json-error { color: #ff8a7a; } }

  .jn { list-style: none; margin: 0; padding: 0; }
  .jrow {
    display: flex;
    align-items: flex-start;
    border-radius: 4px;
    padding: 1px 4px;
    cursor: default;
  }
  .jrow:hover { background: var(--tab-idle); }
  .jrow.match { background: rgba(240,200,60,0.28); }
  .jcaret {
    width: 14px;
    flex: none;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    text-align: center;
  }
  .jcaret.leaf { visibility: hidden; }
  .jkey { color: var(--ink); }
  .jkey::after { content: ": "; color: var(--muted); }
  .jsep { color: var(--muted); }
  .jchildren { margin: 0; padding-left: 16px; list-style: none; border-left: 1px dotted var(--line); }
  .jcount { color: var(--muted); font-style: normal; margin-left: 6px; font-size: 11px; }
  .v-str { color: #2f8f4f; }
  .v-num { color: #2b6fb3; }
  .v-bool { color: #8a5cd1; }
  .v-null { color: var(--muted); }
  @media (prefers-color-scheme: dark) {
    .v-str { color: #82c99a; } .v-num { color: #7ab6e6; } .v-bool { color: #b493e8; }
  }
  .json-foot {
    border-top: 1px solid var(--line);
    padding: 4px 12px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    min-height: 22px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <button data-cmd="undo" title="Undo (Ctrl/Cmd+Z)">↶ Undo</button>
    <button data-cmd="redo" title="Redo (Ctrl/Cmd+Shift+Z)">↷ Redo</button>
    <span class="sep"></span>
    <button data-cmd="cut" title="Cut (Ctrl/Cmd+X)">Cut</button>
    <button data-cmd="copy" title="Copy (Ctrl/Cmd+C)">Copy</button>
    <button data-cmd="paste" title="Paste (Ctrl/Cmd+V)">Paste</button>
    <span class="sep"></span>
    <button data-cmd="font-dec" title="Smaller text (Ctrl/Cmd+-)">A−</button>
    <button data-cmd="font-inc" title="Bigger text (Ctrl/Cmd+=)">A+</button>
    <button data-cmd="font-reset" title="Reset text size">A↺</button>
    <span class="sep"></span>
    <button data-cmd="json-format" title="Pretty-print JSON (Ctrl/Cmd+Shift+F)">{ } Format</button>
    <button data-cmd="json-tree" title="JSON tree view (Ctrl/Cmd+J)">⌘J Tree</button>
    <span class="spacer"></span>
    <span class="hint">Saved locally · no cloud, no tracking</span>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="editor-wrap">
    <textarea id="editor" spellcheck="true" placeholder="Start typing…"></textarea>
    <div class="json-panel" id="json-panel">
      <div class="json-head">
        <span class="title">JSON</span>
        <span class="badge" id="json-badge"></span>
        <input class="json-search" id="json-search" type="search" placeholder="Filter keys/values…" spellcheck="false">
        <span class="grow"></span>
        <button id="json-expand">Expand all</button>
        <button id="json-collapse">Collapse all</button>
        <button id="json-copy">Copy</button>
        <button id="json-close" title="Close (Esc)">✕ Close</button>
      </div>
      <div class="json-body" id="json-body"></div>
      <div class="json-foot" id="json-foot"></div>
    </div>
  </div>

  <div class="statusbar">
    <span id="stat-words">0 words</span>
    <span id="stat-chars">0 chars</span>
    <span id="stat-saved">saved</span>
  </div>

<script>
(function () {
  "use strict";

  var LS = {
    docs: "notepad.docs.v1",
    active: "notepad.active.v1",
    font: "notepad.fontsize.v1",
    openPref: "notepad.openpref.v1"   // "single" | "multi"
  };

  var editor = document.getElementById("editor");
  var tabsEl = document.getElementById("tabs");
  var statWords = document.getElementById("stat-words");
  var statChars = document.getElementById("stat-chars");
  var statSaved = document.getElementById("stat-saved");

  var state = load();      // { docs: [{id,name,body}], activeId }
  var saveTimer = null;

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function load() {
    var docs = [];
    try { docs = JSON.parse(localStorage.getItem(LS.docs)) || []; } catch (e) {}
    if (!Array.isArray(docs) || docs.length === 0) {
      docs = [{ id: uid(), name: "Untitled", body: "" }];
    }
    var activeId = localStorage.getItem(LS.active);
    if (!docs.some(function (d) { return d.id === activeId; })) activeId = docs[0].id;
    return { docs: docs, activeId: activeId };
  }

  function persist() {
    localStorage.setItem(LS.docs, JSON.stringify(state.docs));
    localStorage.setItem(LS.active, state.activeId);
  }

  function activeDoc() {
    return state.docs.find(function (d) { return d.id === state.activeId; });
  }

  function markSaved(txt) {
    statSaved.textContent = txt || "saved";
  }

  function scheduleSave() {
    statSaved.textContent = "editing…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      persist();
      markSaved("saved " + new Date().toLocaleTimeString());
    }, 350);
  }

  function updateStats() {
    var v = editor.value;
    var words = v.trim() ? v.trim().split(/\s+/).length : 0;
    statWords.textContent = words + (words === 1 ? " word" : " words");
    statChars.textContent = v.length + " chars";
  }

  function renderTabs() {
    tabsEl.innerHTML = "";
    state.docs.forEach(function (doc) {
      var tab = document.createElement("div");
      tab.className = "tab" + (doc.id === state.activeId ? " active" : "");
      tab.title = "Double-click name to rename";

      var name = document.createElement("input");
      name.className = "name";
      name.value = doc.name;
      name.readOnly = true;
      name.addEventListener("dblclick", function () {
        name.readOnly = false;
        name.select();
      });
      name.addEventListener("blur", finishRename);
      name.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); name.blur(); }
      });
      function finishRename() {
        name.readOnly = true;
        doc.name = name.value.trim() || "Untitled";
        name.value = doc.name;
        persist();
      }
      name.addEventListener("mousedown", function (e) {
        if (name.readOnly) { e.preventDefault(); switchTo(doc.id); }
      });

      var close = document.createElement("button");
      close.className = "close";
      close.textContent = "×";
      close.title = "Close tab";
      close.addEventListener("click", function (e) {
        e.stopPropagation();
        closeDoc(doc.id);
      });

      tab.appendChild(name);
      tab.appendChild(close);
      tabsEl.appendChild(tab);
    });

    var add = document.createElement("button");
    add.className = "newtab";
    add.textContent = "+";
    add.title = "New note (Ctrl/Cmd+T)";
    add.addEventListener("click", function () { newDoc(); });
    tabsEl.appendChild(add);
  }

  function loadEditor() {
    var doc = activeDoc();
    editor.value = doc ? doc.body : "";
    updateStats();
    editor.focus();
  }

  function switchTo(id) {
    if (id === state.activeId) return;
    state.activeId = id;
    persist();
    renderTabs();
    loadEditor();
  }

  function newDoc() {
    var doc = { id: uid(), name: "Untitled", body: "" };
    state.docs.push(doc);
    state.activeId = doc.id;
    persist();
    renderTabs();
    loadEditor();
  }

  function closeDoc(id) {
    var doc = state.docs.find(function (d) { return d.id === id; });
    if (doc && doc.body.trim() && !confirm("Close “" + doc.name + "”? Its text will be removed from this browser.")) return;
    state.docs = state.docs.filter(function (d) { return d.id !== id; });
    if (state.docs.length === 0) state.docs.push({ id: uid(), name: "Untitled", body: "" });
    if (id === state.activeId) state.activeId = state.docs[0].id;
    persist();
    renderTabs();
    loadEditor();
  }

  // ---- Font size ----
  function applyFont(px) {
    px = Math.min(40, Math.max(10, px));
    editor.style.fontSize = px + "px";
    localStorage.setItem(LS.font, px);
    return px;
  }
  var fontPx = applyFont(parseInt(localStorage.getItem(LS.font), 10) || 15);

  // ---- Toolbar commands ----
  document.querySelector(".toolbar").addEventListener("click", function (e) {
    var btn = e.target.closest("button[data-cmd]");
    if (!btn) return;
    var cmd = btn.dataset.cmd;
    editor.focus();
    if (cmd === "undo") document.execCommand("undo");
    else if (cmd === "redo") document.execCommand("redo");
    else if (cmd === "cut") clipboard("cut");
    else if (cmd === "copy") clipboard("copy");
    else if (cmd === "paste") pasteClipboard();
    else if (cmd === "font-inc") fontPx = applyFont(fontPx + 1);
    else if (cmd === "font-dec") fontPx = applyFont(fontPx - 1);
    else if (cmd === "font-reset") fontPx = applyFont(15);
    else if (cmd === "json-format") formatJson();
    else if (cmd === "json-tree") toggleJsonTree();
  });

  function clipboard(action) {
    try { document.execCommand(action); } catch (e) {}
  }
  function pasteClipboard() {
    if (navigator.clipboard && navigator.clipboard.readText) {
      navigator.clipboard.readText().then(function (text) {
        insertAtCursor(text);
      }).catch(function () { document.execCommand("paste"); });
    } else {
      document.execCommand("paste");
    }
  }
  function insertAtCursor(text) {
    var s = editor.selectionStart, e = editor.selectionEnd;
    editor.value = editor.value.slice(0, s) + text + editor.value.slice(e);
    editor.selectionStart = editor.selectionEnd = s + text.length;
    onInput();
  }

  // ---- Editor input ----
  function onInput() {
    var doc = activeDoc();
    if (doc) doc.body = editor.value;
    updateStats();
    scheduleSave();
  }
  editor.addEventListener("input", onInput);

  // Tab key inserts a tab character instead of moving focus
  editor.addEventListener("keydown", function (e) {
    if (e.key === "Tab") {
      e.preventDefault();
      insertAtCursor("\t");
    }
  });

  // ---- Global shortcuts ----
  document.addEventListener("keydown", function (e) {
    var mod = e.metaKey || e.ctrlKey;
    if (!mod) return;
    var k = e.key.toLowerCase();
    if (k === "t") { e.preventDefault(); newDoc(); }
    else if (e.key === "=" || e.key === "+") { e.preventDefault(); fontPx = applyFont(fontPx + 1); }
    else if (e.key === "-") { e.preventDefault(); fontPx = applyFont(fontPx - 1); }
    else if (e.key === "0") { e.preventDefault(); fontPx = applyFont(15); }
    else if (k === "j") { e.preventDefault(); toggleJsonTree(); }
    else if (k === "f" && e.shiftKey) { e.preventDefault(); formatJson(); }
  });

  // Persist on unload as a safety net
  window.addEventListener("beforeunload", function () {
    var doc = activeDoc();
    if (doc) doc.body = editor.value;
    persist();
  });

  // Keep tabs in sync across real browser tabs of this app
  window.addEventListener("storage", function (e) {
    if (e.key === LS.docs || e.key === LS.active) {
      state = load();
      renderTabs();
      // don't clobber what the user is typing in this tab
    }
  });

  // ---------- Restore-session dialog ----------
  function openInNewBrowserTab() {
    // Open a fresh browser tab pointing at this same app.
    window.open(window.location.href, "_blank");
  }

  function showRestoreDialog() {
    var overlay = document.createElement("div");
    overlay.className = "overlay";
    var noteCount = state.docs.length;
    overlay.innerHTML =
      '<div class="modal">' +
        '<h2>Welcome back</h2>' +
        '<p>You have ' + noteCount + ' saved note' + (noteCount === 1 ? '' : 's') +
        ' from your last session. How would you like to open your workspace?</p>' +
        '<button class="choice" data-pick="single">' +
          '<strong>Continue in this tab</strong>' +
          '<span>Restore all your notes here in one window.</span>' +
        '</button>' +
        '<button class="choice" data-pick="multi">' +
          '<strong>Open each note in its own browser tab</strong>' +
          '<span>Spreads your notes across separate browser tabs.</span>' +
        '</button>' +
        '<label class="remember"><input type="checkbox" id="remember-pref"> Remember my choice</label>' +
      '</div>';
    document.body.appendChild(overlay);

    overlay.addEventListener("click", function (e) {
      var btn = e.target.closest(".choice");
      if (!btn) return;
      var pick = btn.dataset.pick;
      var remember = overlay.querySelector("#remember-pref").checked;
      if (remember) localStorage.setItem(LS.openPref, pick);
      applyOpenChoice(pick);
      overlay.remove();
      editor.focus();
    });
  }

  function applyOpenChoice(pick) {
    if (pick === "multi") {
      // First note stays here; open one browser tab per additional note.
      state.docs.slice(1).forEach(function () { openInNewBrowserTab(); });
    }
    // "single": nothing to do — everything already lives in these tabs.
  }

  // ---------- JSON viewer ----------
  var jsonPanel = document.getElementById("json-panel");
  var jsonBody = document.getElementById("json-body");
  var jsonBadge = document.getElementById("json-badge");
  var jsonFoot = document.getElementById("json-foot");
  var jsonSearch = document.getElementById("json-search");

  // Parse, tolerating a leading BOM / whitespace. Returns {ok,value} or {ok:false,error}.
  function parseJson(text) {
    try { return { ok: true, value: JSON.parse(text) }; }
    catch (err) { return { ok: false, error: err.message, raw: text }; }
  }

  // Pretty-print the current note in place (2-space indent).
  function formatJson() {
    var res = parseJson(editor.value);
    if (!res.ok) {
      markSaved("⚠ invalid JSON");
      if (jsonPanel.classList.contains("open")) renderJson();
      else flashError(res.error);
      return;
    }
    var pretty = JSON.stringify(res.value, null, 2);
    if (pretty !== editor.value) {
      editor.value = pretty;
      onInput();
      persist();
      markSaved("formatted");
    }
    if (jsonPanel.classList.contains("open")) renderJson();
  }

  function flashError(msg) {
    var prev = statSaved.textContent;
    statSaved.textContent = "JSON error: " + msg;
    setTimeout(function () { statSaved.textContent = prev; }, 3000);
  }

  function toggleJsonTree() {
    if (jsonPanel.classList.contains("open")) closeJsonTree();
    else openJsonTree();
  }
  function openJsonTree() {
    jsonPanel.classList.add("open");
    renderJson();
  }
  function closeJsonTree() {
    jsonPanel.classList.remove("open");
    jsonBody.textContent = "";   // free the tree DOM — keeps memory low when closed
    jsonFoot.textContent = "";
    editor.focus();
  }

  function typeOf(v) {
    if (v === null) return "null";
    if (Array.isArray(v)) return "array";
    return typeof v;
  }

  // Build a single collapsible row. Children render lazily on first expand.
  function makeNode(key, value, path) {
    var t = typeOf(value);
    var li = document.createElement("li");
    var row = document.createElement("div");
    row.className = "jrow";
    row.dataset.path = path;

    var caret = document.createElement("span");
    caret.className = "jcaret";
    row.appendChild(caret);

    if (key !== null) {
      var kEl = document.createElement("span");
      kEl.className = "jkey";
      kEl.textContent = key;
      row.appendChild(kEl);
    }

    var isContainer = (t === "object" || t === "array");
    if (isContainer) {
      var keys = Object.keys(value);
      var open = t === "array" ? "[" : "{";
      var close = t === "array" ? "]" : "}";
      caret.textContent = keys.length ? "▸" : "·";
      var summary = document.createElement("span");
      summary.className = "jsep";
      summary.textContent = open + (keys.length ? " … " + close : close);
      var count = document.createElement("span");
      count.className = "jcount";
      count.textContent = keys.length + (t === "array" ? " items" : " keys");
      row.appendChild(summary);
      row.appendChild(count);

      var kids = document.createElement("ul");
      kids.className = "jchildren";
      kids.style.display = "none";
      var built = false;

      function build() {
        if (built) return;
        built = true;
        var frag = document.createDocumentFragment();
        keys.forEach(function (k) {
          var childPath = t === "array" ? path + "[" + k + "]" : path + "." + k;
          frag.appendChild(makeNode(t === "array" ? String(k) : k, value[k], childPath));
        });
        kids.appendChild(frag);
      }
      function setOpen(o) {
        if (o && keys.length) { build(); kids.style.display = ""; caret.textContent = "▾"; summary.textContent = open; }
        else { kids.style.display = "none"; caret.textContent = keys.length ? "▸" : "·"; summary.textContent = open + (keys.length ? " … " + close : close); }
      }
      caret.addEventListener("click", function (e) { e.stopPropagation(); setOpen(kids.style.display === "none"); });
      row.addEventListener("click", function () { setOpen(kids.style.display === "none"); });
      li._setOpen = setOpen;
      li._hasKids = keys.length > 0;

      li.appendChild(row);
      li.appendChild(kids);
    } else {
      caret.classList.add("leaf");
      var val = document.createElement("span");
      if (t === "string") { val.className = "v-str"; val.textContent = JSON.stringify(value); }
      else if (t === "number") { val.className = "v-num"; val.textContent = String(value); }
      else if (t === "boolean") { val.className = "v-bool"; val.textContent = String(value); }
      else { val.className = "v-null"; val.textContent = "null"; }
      row.appendChild(val);
      li.appendChild(row);
    }

    // Footer shows the path of whatever row you hover — cheap, no state kept.
    row.addEventListener("mouseenter", function () { jsonFoot.textContent = path; });
    return li;
  }

  function renderJson() {
    jsonBody.textContent = "";
    jsonFoot.textContent = "";
    var res = parseJson(editor.value);
    if (editor.value.trim() === "") {
      jsonBadge.textContent = "";
      jsonBody.innerHTML = '<div class="json-error" style="color:var(--muted)">This note is empty. Paste JSON here, then press ⌘/Ctrl+J.</div>';
      return;
    }
    if (!res.ok) {
      jsonBadge.textContent = "invalid";
      var el = document.createElement("div");
      el.className = "json-error";
      el.textContent = "Not valid JSON:\n" + res.error;
      jsonBody.appendChild(el);
      return;
    }
    var t = typeOf(res.value);
    jsonBadge.textContent = t;
    var ul = document.createElement("ul");
    ul.className = "jn";
    var root = makeNode(null, res.value, "$");
    ul.appendChild(root);
    jsonBody.appendChild(ul);
    // Auto-expand the root so users see structure immediately.
    if (root._setOpen && root._hasKids) root._setOpen(true);
  }

  // Expand / collapse every already-built node; expanding builds lazily as it goes.
  function walkAll(open) {
    var items = jsonBody.querySelectorAll("li");
    // Expanding must go top-down so parents build their children first.
    var list = Array.prototype.slice.call(items);
    if (!open) list.reverse();
    list.forEach(function (li) { if (li._setOpen) li._setOpen(open); });
    if (open) {
      // Newly built descendants also need opening; one more pass covers a deep tree.
      jsonBody.querySelectorAll("li").forEach(function (li) { if (li._setOpen) li._setOpen(true); });
    }
  }

  document.getElementById("json-expand").addEventListener("click", function () { walkAll(true); });
  document.getElementById("json-collapse").addEventListener("click", function () { walkAll(false); });
  document.getElementById("json-close").addEventListener("click", closeJsonTree);
  document.getElementById("json-copy").addEventListener("click", function () {
    var res = parseJson(editor.value);
    var text = res.ok ? JSON.stringify(res.value, null, 2) : editor.value;
    (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject())
      .then(function () { jsonFoot.textContent = "copied formatted JSON to clipboard"; })
      .catch(function () { jsonFoot.textContent = "copy failed"; });
  });

  // Live filter: highlight rows whose key/value matches; expand to reveal them.
  var searchTimer = null;
  jsonSearch.addEventListener("input", function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilter, 120);
  });
  function applyFilter() {
    var q = jsonSearch.value.trim().toLowerCase();
    jsonBody.querySelectorAll(".jrow.match").forEach(function (r) { r.classList.remove("match"); });
    if (!q) return;
    // Expand everything so matches deeper in the tree are actually in the DOM.
    walkAll(true);
    var hits = 0;
    jsonBody.querySelectorAll(".jrow").forEach(function (r) {
      if (r.textContent.toLowerCase().indexOf(q) !== -1) { r.classList.add("match"); hits++; }
    });
    var first = jsonBody.querySelector(".jrow.match");
    if (first) first.scrollIntoView({ block: "center" });
    jsonFoot.textContent = hits + " match" + (hits === 1 ? "" : "es");
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && jsonPanel.classList.contains("open")) {
      // Let Escape clear the search box first, otherwise close the panel.
      if (document.activeElement === jsonSearch && jsonSearch.value) { jsonSearch.value = ""; applyFilter(); }
      else closeJsonTree();
    }
  });

  // ---------- Boot ----------
  renderTabs();
  loadEditor();
  updateStats();
  markSaved("saved");

  // Only offer the restore choice when arriving fresh (not a child tab we just opened),
  // and only when there is real prior work to restore.
  var isChildTab = false;
  try { isChildTab = !!window.opener && window.opener !== window; } catch (e) {}
  var hasPriorWork = state.docs.some(function (d) { return d.body.trim() || d.name !== "Untitled"; });
  var savedPref = localStorage.getItem(LS.openPref);

  if (hasPriorWork && !isChildTab) {
    if (savedPref) applyOpenChoice(savedPref);
    else showRestoreDialog();
  }
})();
</script>
</body>
</html>
